version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sentinelsafe_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: safe_password_2026
      POSTGRES_DB: sentinelsafe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentinelsafe"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: sentinelsafe_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
